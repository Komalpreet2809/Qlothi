<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qlothi | Shop the Look</title>
    <link rel="stylesheet" href="results.css">
</head>
<body>
    <div class="glass-bg"></div>
    
    <header class="navbar">
        <div class="logo">Qlothi<span>.</span></div>
        <div class="search-info">
            <span id="searching-for">Searching for: </span>
            <strong id="item-query">...</strong>
        </div>
    </header>

    <main class="container">
        <aside class="sidebar">
            <div class="source-img-card glass">
                <h3>Your Inspiration</h3>
                <div class="img-frame">
                    <img id="source-image" src="" alt="Source outfit">
                </div>
            </div>

        </aside>

        <div style="display: flex; flex-direction: column; height: 100%;">
            <section class="results-grid" id="results-grid">
                <!-- Items injected by results.js -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Curating the best matches for you...</p>
                </div>
            </section>

            <footer style="margin-top: auto; text-align: center; padding: 60px 0 20px 0; color: #888; font-size: 14px; font-weight: 500; letter-spacing: 0.5px;">
                Made with ❤️ by <strong>Kobuilds</strong>
            </footer>
        </div>
    </main>

    <script src="results.js"></script>
</body>
</html>
